<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - FreePlay</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./main.js" defer></script>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.svg" />
  </head>
  <body data-page="contact">
    <header>
      <a href="./index.html" class="logo">
        <img src="./assets/favicon.svg" alt="icon" />
        <h1>FreePlay</h1>
      </a>
      <button class="phoneOnly" id="navButton">
        <img src="./assets/hamburgerMenu.svg" alt="Hamburger Menu" />
      </button>
      <nav class="phoneOnly off" id="navDropdown">
        <ul>
          <li>
            <a class="navButton" href="./index.html"
              ><img src="./assets/home.svg" alt="Home" />Home</a
            >
          </li>
          <li>
            <a class="navButton" href="./games.html"
              ><img src="./assets/games.svg" alt="Games" />Games</a
            >
          </li>
          <li>
            <a class="navButton" href="./favourites.html"
              ><img
                src="./assets/favourite.svg"
                alt="Favourites"
              />Favourites</a
            >
          </li>
          <li>
            <a class="navButton" href="./contact.html"
              ><img src="./assets/contact.svg" alt="Contact" />Contact</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="pageTitle">
        <h2>Suggest a game</h2>
      </section>

      <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" type="text" />
        <p class="error" id="nameError"></p>

        <label for="email">Email</label>
        <input id="email" type="email" />
        <p class="error" id="emailError"></p>

        <label for="gameName">Game name</label>
        <input id="gameName" type="text" />
        <p class="error" id="gameError"></p>

        <label for="message">Why do you like it?</label>
        <textarea id="message"></textarea>
        <p class="error" id="messageError"></p>

        <button class="mainButton" type="submit">Send</button>
        <p class="success" id="successText"></p>
      </form>

      <section class="savedSuggestions">
        <h2>Saved suggestions</h2>
        <div id="suggestionsList"></div>
      </section>
    </main>

    <footer>
      <p>
        Game data from
        <a href="https://www.freetogame.com/" target="_blank">FreeToGame</a>.
      </p>
    </footer>
  </body>
</html>
